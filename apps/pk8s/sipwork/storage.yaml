---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sipwork-semaphoreui
  labels:
    org.democratic-csi.manual: sipwork-semaphoreui
spec:
  capacity:
    storage: 10Gi
  csi:
    driver: org.democratic-csi.node-manual
    volumeHandle: pvc-8c7f1c68-5ffe-4add-8ac4-35ec2b32311a
    fsType: ext4
    volumeAttributes:
      interface: ''
      iqn: >-
        iqn.2005-10.org.freenas.ctl:csi-pvc-8c7f1c68-5ffe-4add-8ac4-35ec2b32311a-cluster
      lun: '0'
      node_attach_driver: iscsi
      portal: 192.168.4.5:3260
      portals: ''
      provisioner_driver: node-manual
    controllerPublishSecretRef:
      name: controller-publish-secret-freenas-iscsi-csi-democratic-csi
      namespace: democratic-csi
    nodeStageSecretRef:
      name: node-stage-secret-freenas-iscsi-csi-democratic-csi
      namespace: democratic-csi
    nodePublishSecretRef:
      name: node-publish-secret-freenas-iscsi-csi-democratic-csi
      namespace: democratic-csi
    controllerExpandSecretRef:
      name: controller-expand-secret-freenas-iscsi-csi-democratic-csi
      namespace: democratic-csi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: semaphoreui
  namespace: sipwork
spec:
  accessModes:
    - ReadWriteOnce
  selector:
    matchLabels:
      org.democratic-csi.manual: sipwork-semaphoreui
  resources:
    requests:
      storage: 10Gi
---
