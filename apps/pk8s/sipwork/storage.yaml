      iqn: >-
        iqn.2005-10.org.freenas.ctl:csi-pvc-2de39f4d-d570-47f1-b70b-987e2f2a989c-cluster
      lun: '0'
      node_attach_driver: iscsi
      portal: 192.168.4.5:3260
      portals: ''
